name: Code Quality

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install black isort flake8

    - name: Check code formatting with Black
      run: |
        black --check --diff akavesdk/ private/ sdk/ tests/

    - name: Check import sorting with isort
      run: |
        isort --check-only --diff akavesdk/ private/ sdk/ tests/

    - name: Lint with flake8
      run: |
        flake8 akavesdk/ private/ sdk/ tests/ --count --max-complexity=10 --max-line-length=120 --show-source --statistics

  security:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety

    - name: Check for security vulnerabilities with Safety
      run: |
        safety check --json

  dependencies:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Check dependency versions
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit
        pip-audit --desc
